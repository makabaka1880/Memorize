# SM-2 Spaced Repetition Algorithm Configuration

[sm2]
# Initial easiness factor for new cards
ef_initial = 2.5

# Minimum easiness factor (EF will not go below this)
ef_min = 1.3

# Interval after first successful review (in days)
interval_first = 1

# Interval after second successful review (in days)
interval_second = 6

# EF formula coefficients: EF += coef_a - (5-q) * (coef_b + (5-q) * coef_c)
# where q is the quality score (0-5)
ef_coef_a = 0.1
ef_coef_b = 0.08
ef_coef_c = 0.02
